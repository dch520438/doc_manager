name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: pyinstaller doc_manager.spec --onefile --windowed
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-manager-windows
        path: dist/文档管家.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        pyinstaller doc_manager.spec --onefile --windowed --name doc-manager-linux
        chmod +x dist/doc-manager-linux
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-manager-linux
        path: dist/doc-manager-linux

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-manager-windows
        path: ./release/
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: doc-manager-linux
        path: ./release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
