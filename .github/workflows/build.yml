name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Windows executable
      run: |
        pyinstaller --onedir --windowed --name "文档管家-win" main.py

    - name: Package as zip
      run: |
        cd dist
        powershell -Command "Compress-Archive -Path '文档管家-win' -DestinationPath '文档管家-win.zip' -Force"
        dir

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-manager-windows
        path: dist/文档管家-win.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Linux executable
      run: |
        pyinstaller --onedir --name "文档管家-linux" main.py
        chmod +x dist/文档管家-linux/文档管家-linux

    - name: Package as zip
      run: |
        cd dist
        zip -r "文档管家-linux.zip" "文档管家-linux"
        ls -la

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: doc-manager-linux
        path: dist/文档管家-linux.zip
